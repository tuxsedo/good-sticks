<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- C-volute branching upward from center -->
  <path d="M40,40 C37,30 32,22 35,15 C37,10 43,10 45,16 C47,22 44,30 40,40"
        fill="none" stroke="white" stroke-opacity="0.075" stroke-width="0.55" stroke-linecap="round"/>
  <!-- C-volute branching downward -->
  <path d="M40,40 C43,50 48,58 45,65 C43,70 37,70 35,64 C33,58 36,50 40,40"
        fill="none" stroke="white" stroke-opacity="0.075" stroke-width="0.55" stroke-linecap="round"/>
  <!-- C-volute branching right -->
  <path d="M40,40 C50,37 58,32 65,35 C70,37 70,43 64,45 C58,47 50,44 40,40"
        fill="none" stroke="white" stroke-opacity="0.075" stroke-width="0.55" stroke-linecap="round"/>
  <!-- C-volute branching left -->
  <path d="M40,40 C30,43 22,48 15,45 C10,43 10,37 16,35 C22,33 30,36 40,40"
        fill="none" stroke="white" stroke-opacity="0.075" stroke-width="0.55" stroke-linecap="round"/>

  <!-- Leaf teardrops at volute tips -->
  <path d="M38,24 C37,20 39,17 40,17 C41,17 43,20 42,24 C41,27 39,27 38,24Z"
        fill="white" fill-opacity="0.065"/>
  <path d="M42,56 C43,60 41,63 40,63 C39,63 37,60 38,56 C39,53 41,53 42,56Z"
        fill="white" fill-opacity="0.065"/>
  <path d="M56,38 C60,37 63,39 63,40 C63,41 60,43 56,42 C53,41 53,39 56,38Z"
        fill="white" fill-opacity="0.065"/>
  <path d="M24,42 C20,43 17,41 17,40 C17,39 20,37 24,38 C27,39 27,41 24,42Z"
        fill="white" fill-opacity="0.065"/>

  <!-- Central rosette — 8-pointed compass star -->
  <g stroke="white" stroke-opacity="0.1" stroke-width="0.6" stroke-linecap="round">
    <line x1="40" y1="35" x2="40" y2="45"/>
    <line x1="35" y1="40" x2="45" y2="40"/>
    <line x1="36.5" y1="36.5" x2="43.5" y2="43.5"/>
    <line x1="43.5" y1="36.5" x2="36.5" y2="43.5"/>
  </g>
  <circle cx="40" cy="40" r="2" fill="white" fill-opacity="0.11"/>
</svg>
